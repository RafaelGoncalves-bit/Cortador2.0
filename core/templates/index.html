{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortador2.0</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="bg-escuro">
  <header>
    <nav class="navbar bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand text-light" href="#">
          <img src="{% static 'icon.png' %}" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
          Cortador2.0
        </a>
      </div>
    </nav>
  </header>
  <main>
    <div class="container py-5">

      <!-- CARD PRINCIPAL -->
      <div class="card bg-dark text-light shadow-lg border-0 rounded-4 p-4 text-center">

        <h2 class="mb-4 fw-bold">📎 Anexos</h2>

        <!-- CARDS INTERNOS -->
        <div class="d-flex justify-content-center gap-4 flex-wrap">

          <!-- CARD 1 -->
          <div class="card bg-secondary text-light border-0 shadow-sm rounded-3 p-3" style="width: 260px;">
            <div class="card-body">
              <h5 class="card-title mb-3">Anexe os Holerites</h5><br>
              <label class="btn btn-primary w-100" for="pdf-upload">
                Anexar PDF
              </label>
            </div>
          </div>

          <!-- CARD 2 -->
          <div class="card bg-secondary text-light border-0 shadow-sm rounded-3 p-3" style="width: 260px;">
            <div class="card-body">
              <div class="mb-3">
                <h5 class="card-title mb-3">Anexe os Espelho Ponto</h5>
                <label class="btn btn-primary w-100" for="pdf-upload">
                  Anexar PDF
                </label>


                <input type="file" id="pdf-upload" name="pdf-upload" accept=".pdf" class="d-none">
              </div>


            </div>
          </div>

        </div>

        <!-- BOTÃO FINAL -->
        <div class="d-flex justify-content-center">
          <button class="btn btn-success px-5 py-3 mt-4 fw-semibold shadow">
            Cortar e Enviar
          </button>
        </div>

      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>

</html>
