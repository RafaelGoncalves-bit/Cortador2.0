{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortador2.0</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="bg-escuro">
  <header>
    <nav class="navbar bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand text-light" href="#">
          <img src="{% static 'icon.png' %}" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
          Cortador2.0
        </a>
      </div>
    </nav>
  </header>

  <main>
    <div class="container py-5">
      <div class="card bg-dark text-light shadow-lg border-0 rounded-4 p-4 text-center">
        {% if messages %}
        {% for message in messages %}
        <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-warning{% endif %}">
          {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        <h2 class="mb-4 fw-bold">📎 Anexos</h2>

        <form action="{% url 'processar_dados' %}" method="post" enctype="multipart/form-data">
          {% csrf_token %}

            <h3 for="name" class="d-flex justify-content-center">Data</h3>
            <input class="p-2 w-25 text-center bg-dark text-light border rounded mb-4 no-spinners" type="text" name="data" required placeholder="Ex: 04-2026">
          

          <div class="d-flex justify-content-center gap-4 flex-wrap">

            <div class="card bg-secondary text-light border-0 shadow-sm rounded-3 p-3" style="width: 280px;">
              <div class="card-body">
                <h5 class="card-title mb-3">Holerites</h5>
                <label class="btn btn-primary w-100" for="file-holerites">Selecionar PDF</label>
                <input type="file" id="file-holerites" name="holerites" accept=".pdf" class="d-none"
                  onchange="updateFileName(this)">
                <small id="name-holerites" class="d-block mt-2 fw-bold text-warning"></small>
              </div>
            </div>

            <div class="card bg-secondary text-light border-0 shadow-sm rounded-3 p-3" style="width: 280px;">
              <div class="card-body">
                <h5 class="card-title mb-3">Espelho Ponto</h5>
                <label class="btn btn-primary w-100" for="file-ponto">Selecionar PDF</label>
                <input type="file" id="file-ponto" name="ponto" accept=".pdf" class="d-none"
                  onchange="updateFileName(this)">
                <small id="name-ponto" class="d-block mt-2 fw-bold text-warning"></small>
              </div>
            </div>

          </div>

          <div class="d-flex justify-content-center">
            <button type="submit" class="btn btn-success px-5 py-3 mt-4 fw-semibold shadow">
              Cortar e Enviar
            </button>
          </div>
        </form>

      </div>
    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'main.js' %}"></script>
</body>

</html>
